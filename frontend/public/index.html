<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="theme-color" content="#0f172a" />
    <title>English Cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#f5f3ff",
                100: "#ede9fe",
                200: "#ddd6fe",
                300: "#c4b5fd",
                400: "#a78bfa",
                500: "#8b5cf6",
                600: "#7c3aed",
                700: "#6d28d9",
                800: "#5b21b6",
                900: "#4c1d95",
              },
            },
            fontFamily: {
              sans: [
                "system-ui",
                "-apple-system",
                "Segoe UI",
                "Roboto",
                "Helvetica",
                "Arial",
                "sans-serif",
              ],
            },
          },
        },
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100 antialiased relative overflow-x-hidden">
    <div class="fixed inset-0 pointer-events-none overflow-hidden -z-10">
      <div class="absolute top-0 left-1/4 w-96 h-96 bg-brand-900/40 rounded-full blur-[100px]"></div>
      <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-blue-900/30 rounded-full blur-[100px]"></div>
    </div>
    <div id="app" class="min-h-screen"></div>

    <template id="tpl-auth">
      <section class="px-5 pt-10 pb-24 flex-1 flex flex-col max-w-md mx-auto w-full relative z-10">
        <div class="text-center mb-8">
          <div class="text-5xl mb-2">📚</div>
          <h1 class="text-2xl font-bold text-white">English Cards</h1>
          <p class="text-sm text-slate-400 mt-1">Учим английский по карточкам и квизам</p>
        </div>

        <div class="glass-panel rounded-2xl p-5">
          <div class="flex bg-slate-900/50 rounded-xl p-1 mb-4 border border-white/5">
            <button
              data-tab="login"
              class="tab-btn flex-1 py-2 rounded-lg text-sm font-medium"
            >
              Вход
            </button>
            <button data-tab="register" class="tab-btn flex-1 py-2 rounded-lg text-sm font-medium">
              Регистрация
            </button>
          </div>

          <form data-form="login" class="space-y-3">
            <input
              type="email"
              name="email"
              required
              placeholder="Email"
              class="input"
              autocomplete="email"
            />
            <input
              type="password"
              name="password"
              required
              placeholder="Пароль"
              class="input"
              autocomplete="current-password"
            />
            <button type="submit" class="btn-primary w-full">Войти</button>
          </form>

          <form data-form="register" class="space-y-3 hidden">
            <input
              type="text"
              name="username"
              required
              minlength="2"
              placeholder="Имя"
              class="input"
            />
            <input
              type="email"
              name="email"
              required
              placeholder="Email"
              class="input"
              autocomplete="email"
            />
            <input
              type="password"
              name="password"
              required
              minlength="6"
              placeholder="Пароль (мин. 6 символов)"
              class="input"
              autocomplete="new-password"
            />
            <button type="submit" class="btn-primary w-full">Создать аккаунт</button>
          </form>

          <div data-error class="hidden mt-3 text-sm text-rose-400 bg-rose-950/50 border border-rose-900/50 rounded-lg p-2"></div>
        </div>
      </section>
    </template>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
